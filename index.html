    <meta charset="UTF-8" />

    <title>Pitore</title>
    
    <meta name="description" id="meta-desc" content="Entre no mundo enigmático da Pitore e compre seu PiTeni, PiDin, PiMor ou... conheça a nossa ética, marca e diário.">
    
    <link rel="shortcut icon" href="./favicon.png?v=2" type="image/png">
    <link rel="icon" href="./favicon.png?v=2" type="image/png">

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <script>
      function atualizarMeta() {
        const hash = window.location.hash;
        const metaTag = document.getElementById('meta-desc');

        if (hash === '#/sobre') {
          document.title = "Sobre | Pitore";
          metaTag.content = "Observe o meu negócio mais de perto e verá o enigma sublime em sua essência";
        } else if (hash === '#/sobre/contato') {
          document.title = "Contato | Pitore";
          metaTag.content = "O contato da Pitore é simples e versátil.";
        } else if (hash === '#/sobre/mim') {
          document.title = "Mim | Pitore";
          metaTag.content = "Um pouco sobre mim, a Pitore, que é uma empresa, mas começou como uma pessoa.";
        } else if (hash === '#/sobre/etica') {
          document.title = "Ética | Pitore";
          metaTag.content = "Na Pitore estamos sempre cuidando da ética.";
        } else if (hash === '#/sobre/marca') {
          document.title = "Marca | Pitore";
          metaTag.content = "A marca Pitore é muito peculiar. Conheça as logos e lemas.";
        } else if (hash === '#/sobre/editorial') {
          document.title = "Editorial | Pitore";
          metaTag.content = "Editorial Pitore é uma fonte de informação que arquiteta os 7 pilares da experiência humana.";
        } else if (hash === '#/sobre/juridico') {
          document.title = "Jurídico | Pitore";
          metaTag.content = "O jurídico da Pitore é transparente.";
        } else if (hash === '#/butique/pistilo') {
          document.title = "Pistilo | Pitore";
          metaTag.content = "Pistilo é um livro de Estilo.";
        } else if (hash === '#/butique/pilin') {
          document.title = "PiLin | Pitore";
          metaTag.content = "PiLin é um livro de Língua.";
        } else if (hash === '#/butique/pisofia') {
          document.title = "PiSofia | Pitore";
          metaTag.content = "PiSofia é um livro de Filosofia.";
        } else if (hash === '#/butique/pisau') {
          document.title = "PiSau | Pitore";
          metaTag.content = "PiSau é um livro de Saúde.";
        } else if (hash === '#/butique/pidin') {
          document.title = "PiDin | Pitore";
          metaTag.content = "PiDin é um livro de Dinheiro.";
        } else if (hash === '#/butique/piteni') {
          document.title = "PiTeni | Pitore";
          metaTag.content = "PiTeni é um livro de Entretenimento.";
        } else if (hash === '#/butique/pimor') {
          document.title = "PiMor | Pitore";
          metaTag.content = "PiMor é um livro de Amor.";
        } else if (hash === '#/butique') {
          document.title = "Butique | Pitore";
          metaTag.content = "Compre os produtos enigmáticos da Pitore.";
        } else if (hash === '#/loja') {
          document.title = "Loja | Pitore";
          metaTag.content = "Compre os produtos que você conhece através da Pitore.";
        } else {
          document.title = "Pitore";
          metaTag.content = "Entre no mundo enigmático da Pitore.";
        }
      }

      window.addEventListener('hashchange', atualizarMeta);
      window.addEventListener('load', atualizarMeta);
    </script>
  </body>
</html>
